<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEAR Connect</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: transparent;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            overflow: auto;
        }
    </style>
</head>
<body>
    <script>
        // Polyfill String.prototype.replaceAll for older WebView versions (Chrome < 85)
        if (!String.prototype.replaceAll) {
            String.prototype.replaceAll = function(search, replacement) {
                if (search instanceof RegExp) {
                    if (!search.global) { throw new TypeError('replaceAll must be called with a global RegExp'); }
                    return this.replace(search, replacement);
                }
                return this.split(search).join(replacement);
            };
        }
    </script>
    <script type="module">
        import { NearConnector } from "https://cdn.jsdelivr.net/npm/@hot-labs/near-connect@0.11.0/+esm";

        function postToNative(type, data) {
            try {
                if (typeof NearConnectBridge !== 'undefined') {
                    NearConnectBridge.onEvent(JSON.stringify({ type, ...data }));
                }
            } catch (e) {
                console.error("postToNative error:", e);
            }
        }

        // BigInt-safe JSON serializer (NEAR uses BigInt for gas, deposits, block heights, etc.)
        function safeStringify(obj) {
            return JSON.stringify(obj, (key, value) =>
                typeof value === "bigint" ? value.toString() : value
            );
        }

        // Ledger executor URL. near-connect fetches this URL (with ?nonce=...
        // appended) and injects the response text into an iframe srcdoc.
        // On Android, this fetch is intercepted by shouldInterceptRequest()
        // and served from local assets.
        const _ledgerExecutorURL = "https://raw.githubusercontent.com/near/near-connect-ledger/refs/heads/main/ledger-executor.js";

        let connector = null;

        async function init(network) {
            try {
                connector = new NearConnector({
                    network: network || "mainnet",
                });

                // Expose connector for runtime wallet registration (used by tests)
                window._nearConnector = connector;

                connector.on("wallet:signIn", (event) => {
                    const account = event.accounts && event.accounts[0];
                    if (account) {
                        postToNative("signIn", {
                            accountId: account.accountId,
                            publicKey: account.publicKey || null,
                            walletId: event.source || "unknown",
                        });
                    }
                });

                connector.on("wallet:signInAndSignMessage", (event) => {
                    const account = event.accounts && event.accounts[0];
                    if (account) {
                        postToNative("signInAndSignMessage", {
                            accountId: account.accountId,
                            publicKey: account.publicKey || null,
                            walletId: event.source || "unknown",
                            signedMessage: account.signedMessage || null,
                        });
                    }
                });

                connector.on("wallet:signOut", () => {
                    postToNative("signOut", {});
                });

                postToNative("ready", {});

                // Register Ledger hardware wallet (BLE via Android bridge)
                try {
                    console.log("[NEARConnect] Registering Ledger wallet with executor URL:", _ledgerExecutorURL);
                    await connector.whenManifestLoaded;
                    await connector.registerWallet({
                        id: "ledger",
                        name: "Ledger",
                        icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='8' fill='%23000'/%3E%3Cpath d='M24.5 6H10v17.5h17.5V10.5A4.5 4.5 0 0024.5 6zM6 6v5h4V6H6zm0 9v4h4v-4H6zm0 8v11h5.5v-4h-1.5v-3H6v-4zm22 7v4h5.5a4.5 4.5 0 004.5-4.5V30h-4v4H28zm8-8v4h4v-4h-4zm0-9v4h4v-4h-4z' fill='%23fff'/%3E%3C/svg%3E",
                        description: "Ledger hardware wallet via Bluetooth",
                        website: "https://www.ledger.com",
                        version: "1.0.0",
                        executor: _ledgerExecutorURL,
                        type: "sandbox",
                        platform: [],
                        features: {
                            signMessage: true,
                            signTransaction: true,
                            signInWithoutAddKey: false,
                            signInAndSignMessage: true,
                            signAndSendTransaction: true,
                            signAndSendTransactions: true,
                            signDelegateActions: true,
                            mainnet: true,
                            testnet: true,
                        },
                        permissions: {
                            storage: true,
                            bluetooth: true,
                            allowsOpen: [],
                        },
                    });
                    console.log("[NEARConnect] Ledger wallet registered successfully");
                } catch (e) {
                    console.warn("[NEARConnect] Failed to register Ledger wallet:", e);
                }
            } catch (err) {
                postToNative("error", { message: "Init failed: " + err.message });
            }
        }

        window.nearConnect = async function() {
            if (!connector) {
                postToNative("error", { message: "Connector not initialized" });
                return;
            }
            try {
                await connector.connect();
            } catch (err) {
                postToNative("error", { message: err.message });
            }
        };

        window.nearConnectWallet = async function(walletId) {
            if (!connector) {
                postToNative("error", { message: "Connector not initialized" });
                return;
            }
            try {
                await connector.connect({ walletId: walletId });
            } catch (err) {
                postToNative("error", { message: err.message });
            }
        };

        window.nearConnectWithSignMessage = async function(message, recipient, nonceBase64) {
            if (!connector) {
                postToNative("error", { message: "Connector not initialized" });
                return;
            }
            try {
                const nonceArray = Uint8Array.from(atob(nonceBase64), c => c.charCodeAt(0));
                await connector.connect({
                    signMessageParams: {
                        message: message,
                        recipient: recipient,
                        nonce: nonceArray,
                    }
                });
            } catch (err) {
                postToNative("error", { message: err.message });
            }
        };

        window.nearDisconnect = async function() {
            if (!connector) return;
            try {
                await connector.disconnect();
                postToNative("signOut", {});
            } catch (err) {
                postToNative("error", { message: err.message });
            }
        };

        window.nearSignAndSendTransaction = async function(receiverId, actionsJson) {
            if (!connector) {
                postToNative("transactionError", { message: "Connector not initialized" });
                return;
            }
            try {
                const wallet = await connector.wallet();
                if (!wallet) {
                    postToNative("transactionError", { message: "No wallet connected" });
                    return;
                }
                const actions = JSON.parse(actionsJson);
                const result = await wallet.signAndSendTransaction({
                    receiverId: receiverId,
                    actions: actions,
                });
                const hash = result && result.transaction_outcome
                    ? result.transaction_outcome.id
                    : (result && result.transaction ? result.transaction.hash : null);
                postToNative("transactionResult", {
                    transactionHash: hash || "unknown",
                    result: safeStringify(result),
                });
            } catch (err) {
                postToNative("transactionError", { message: err.message });
            }
        };

        window.nearSignAndSendTransactions = async function(transactionsJson) {
            if (!connector) {
                postToNative("transactionError", { message: "Connector not initialized" });
                return;
            }
            try {
                const wallet = await connector.wallet();
                if (!wallet) {
                    postToNative("transactionError", { message: "No wallet connected" });
                    return;
                }
                const transactions = JSON.parse(transactionsJson);
                const results = await wallet.signAndSendTransactions({ transactions });
                postToNative("transactionsResult", { results: safeStringify(results) });
            } catch (err) {
                postToNative("transactionError", { message: err.message });
            }
        };

        window.nearSignDelegateActions = async function(delegateActionsJson) {
            if (!connector) {
                postToNative("delegateActionError", { message: "Connector not initialized" });
                return;
            }
            try {
                const wallet = await connector.wallet();
                if (!wallet) {
                    postToNative("delegateActionError", { message: "No wallet connected" });
                    return;
                }
                const delegateActions = JSON.parse(delegateActionsJson);
                const result = await wallet.signDelegateActions({ delegateActions });

                // near-connect 0.11.0+ returns base64-encoded borsh-serialized SignedDelegate strings directly
                postToNative("delegateActionResult", {
                    signedDelegateActions: result.signedDelegateActions || [],
                });
            } catch (err) {
                console.error("[NEARConnect] nearSignDelegateActions error:", err, err && err.stack);
                postToNative("delegateActionError", { message: err.message + (err.stack ? "\n" + err.stack : "") });
            }
        };

        window.nearSignMessage = async function(message, recipient, nonceBase64) {
            if (!connector) {
                postToNative("messageError", { message: "Connector not initialized" });
                return;
            }
            try {
                const wallet = await connector.wallet();
                if (!wallet) {
                    postToNative("messageError", { message: "No wallet connected" });
                    return;
                }
                const nonceArray = Uint8Array.from(atob(nonceBase64), c => c.charCodeAt(0));
                const result = await wallet.signMessage({
                    message: message,
                    recipient: recipient,
                    nonce: nonceArray,
                });
                postToNative("messageResult", {
                    accountId: result.accountId,
                    publicKey: result.publicKey,
                    signedMessage: result.signedMessage,
                });
            } catch (err) {
                postToNative("messageError", { message: err.message });
            }
        };

        // ================================================================
        // Ledger BLE Bridge Relay
        // ================================================================

        const LEDGER_BLE_REQUEST = "near-connect:ledger-ble:request";
        const LEDGER_BLE_RESPONSE = "near-connect:ledger-ble:response";

        // Listen for Ledger BLE requests from the sandbox iframe
        window.addEventListener("message", (event) => {
            if (!event.data || event.data.type !== LEDGER_BLE_REQUEST) return;
            const { id, action, params } = event.data;
            console.log("[BLE Relay] iframe->Native:", action, "id:", id, "params:", JSON.stringify(params));
            try {
                NearConnectBridge.onLedgerBLE(JSON.stringify({
                    action,
                    id,
                    ...(params || {}),
                }));
            } catch (e) {
                console.error("[BLE Relay] Native bridge unavailable:", e.message);
                if (event.source) {
                    event.source.postMessage({
                        type: LEDGER_BLE_RESPONSE,
                        id,
                        error: "Native BLE bridge unavailable: " + e.message,
                    }, "*");
                }
            }
        });

        // Native calls _ledgerBLECallback(id, result, error) — relay to iframe
        window._ledgerBLECallback = function(id, result, error) {
            const iframes = document.querySelectorAll("iframe");
            const message = { type: LEDGER_BLE_RESPONSE, id, result, error };
            iframes.forEach(iframe => {
                try {
                    iframe.contentWindow.postMessage(message, "*");
                } catch (e) {
                    console.error("[BLE Relay] postMessage to iframe failed:", e.message);
                }
            });
        };

        // Capture unhandled errors and forward to native for debugging
        window.onerror = function(msg, src, line, col, err) {
            postToNative("error", { message: "JS: " + msg + " (line " + line + ")" });
        };

        const urlParams = new URLSearchParams(window.location.search);
        const network = urlParams.get("network") || "mainnet";
        init(network);
    </script>
</body>
</html>
